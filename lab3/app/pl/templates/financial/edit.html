{% extends "base.html" %}

{% block title %}Edit Financial Record{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Financial Record #{{ record.id }}</h1>
    <a href="{{ url_for('financial.index') }}" class="btn btn-secondary">Back</a>
</div>

<form method="post" action="{{ url_for('financial.edit', record_id=record.id) }}" class="form-card">
    <div class="form-group">
        <label for="period">Period</label>
        <input type="text" id="period" name="period" value="{{ record.period }}" required>
    </div>
    <div class="form-group">
        <label for="department">Department</label>
        <input type="text" id="department" name="department" value="{{ record.department }}" required>
    </div>
    <div class="form-group">
        <label for="revenue">Revenue</label>
        <input type="number" id="revenue" name="revenue" step="0.01" min="0" value="{{ record.revenue }}" required>
    </div>
    <div class="form-group">
        <label for="expenses">Expenses</label>
        <input type="number" id="expenses" name="expenses" step="0.01" min="0" value="{{ record.expenses }}" required>
    </div>
    <p class="hint">Profit is calculated automatically as Revenue &minus; Expenses.</p>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ url_for('financial.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
