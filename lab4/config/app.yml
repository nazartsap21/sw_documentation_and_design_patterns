# Switch output strategy by changing the value below.
# Allowed values: console | kafka | redis
output:
  strategy: kafka

data:
  file_path: "data/storm_events.csv"
  max_rows: 1000      # set to null to process all rows

kafka:
  bootstrap_servers: "localhost:9092"
  topic: "storm-events"

redis:
  host: "localhost"
  port: 6379
  key: "storm-events"
